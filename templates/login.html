{% extends "base.html" %}
{% block title %}Login – RoomiePay{% endblock %}

{% block content %}
<style>
  .login-wrap {
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    background: #0f0f14;
    position: relative; overflow: hidden;
  }
  html:not(.dark-mode) .login-wrap {
    background: var(--ink);
  }
  /* Geometric background */
  .login-wrap::before {
    content: '';
    position: absolute; inset: 0;
    background:
      radial-gradient(circle at 20% 80%, rgba(92,61,244,.15) 0%, transparent 50%),
      radial-gradient(circle at 80% 20%, rgba(255,107,53,.12) 0%, transparent 50%);
  }
  .login-card {
    position: relative; z-index: 1;
    background: rgba(30, 30, 38, 0.6);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,.08);
    border-radius: 20px;
    padding: 3rem 2.5rem;
    width: min(420px, 90vw);
    text-align: center;
    box-shadow: 0 24px 64px rgba(0,0,0,.5);
  }
  html:not(.dark-mode) .login-card {
    background: rgba(255,255,255,.05);
    border-color: rgba(255,255,255,.12);
  }
  .login-logo {
    font-family: var(--font-head);
    font-size: 2.5rem; font-weight: 800;
    color: #fff; letter-spacing: -1px; margin-bottom: .25rem;
  }
  .login-logo span { color: var(--accent2); }
  .login-sub { color: rgba(255,255,255,.5); font-size: .9rem; margin-bottom: 2rem; }
  .login-input {
    background: rgba(255,255,255,.08) !important;
    border-color: rgba(255,255,255,.15) !important;
    color: #fff !important;
  }
  .login-input::placeholder { color: rgba(255,255,255,.35); }
  .login-input:focus {
    border-color: var(--accent) !important;
    box-shadow: 0 0 0 3px rgba(92,61,244,.3) !important;
  }
  .login-btn {
    width: 100%; padding: .75rem;
    background: var(--accent); color: #fff;
    border: none; border-radius: 12px; font-size: 1rem; font-weight: 600;
    font-family: var(--font-head); cursor: pointer;
    transition: box-shadow .2s, transform .1s;
    box-shadow: 0 4px 16px rgba(92,61,244,.4);
  }
  .login-btn:hover { box-shadow: 0 8px 24px rgba(92,61,244,.5); }
  .login-btn:active { transform: scale(.98); }
  .dots {
    display: flex; gap: .5rem; justify-content: center; margin-top: 1.5rem;
  }
  .dot { width: 6px; height: 6px; border-radius: 50%; }
</style>

<div class="login-wrap">
  <div class="login-card">
    <div class="login-logo">Roomie<span>Pay</span></div>
    <p class="login-sub">Shared expense tracker for your place</p>

    <form action="{{ url_for('login') }}" method="POST">
      <div class="form-group" style="text-align:left">
        <label style="color:rgba(255,255,255,.6)">Group Password</label>
        <input type="password" name="password" class="login-input"
               placeholder="Enter your group password" required autofocus/>
      </div>
      <button type="submit" class="login-btn">Enter Dashboard →</button>
    </form>

    <div class="dots">
      <div class="dot" style="background:var(--accent)"></div>
      <div class="dot" style="background:var(--accent2)"></div>
      <div class="dot" style="background:var(--accent3)"></div>
    </div>
  </div>
</div>
{% endblock %}
